<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fighter Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --p: #7B2FFF;
  --pl: #A855F7;
  --pc: #C084FC;
  --gold: #F5C842;
  --bg: #06060A;
  --surf: #0B0B12;
  --border: #181824;
  --text: #DDD8F0;
  --muted: #4A4A68;
  --dim: #131320;
  --glow-sm: 0 0 8px rgba(123,47,255,0.7), 0 0 20px rgba(123,47,255,0.3);
  --glow-gold: 0 0 10px rgba(245,200,66,0.6), 0 0 25px rgba(245,200,66,0.2);
  --green: #22c55e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #000; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  min-height: 100vh; max-width: 320px; margin: 0 auto;
  overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.13) 2px, rgba(0,0,0,0.13) 4px);
  pointer-events: none; z-index: 9999;
}

/* HERO */
.hero {
  position: relative; width: 100%; height: 200px; overflow: hidden;
  background: #0a0420;
  border-bottom: 2px solid rgba(123,47,255,0.4);
}
.hero-photo {
  position: absolute; inset: 0;
  background: var(--dim);
}
.hero-photo img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }
.hero-photo-empty {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
}
.hero-photo-empty svg { opacity: 0.06; }
.hero-fade {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(6,6,10,1) 0%, rgba(6,6,10,0.7) 40%, transparent 100%);
}
.hero-left-bar {
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--p); box-shadow: var(--glow-sm);
}
.hero-content {
  position: absolute; bottom: 0; left: 0; right: 0; padding: 0 12px 10px;
  z-index: 2;
}
.hero-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 44px; letter-spacing: 2px; line-height: 1;
  color: #fff; text-transform: uppercase;
  text-shadow: 0 2px 20px rgba(0,0,0,0.8);
}
.hero-sub {
  display: flex; align-items: center; gap: 8px; margin-top: 2px;
}
.hero-wc {
  font-family: 'Space Mono', monospace; font-size: 8px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
}
.hero-rank {
  font-family: 'Space Mono', monospace; font-size: 8px;
  letter-spacing: 1px; color: var(--pl); text-shadow: var(--glow-sm);
}

/* RECORD BAR */
.record-bar {
  display: flex; align-items: stretch;
  border-bottom: 1px solid var(--border);
  background: var(--surf);
}
.rec-block {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 10px 4px;
  border-right: 1px solid var(--border);
}
.rec-block:last-child { border-right: none; }
.rec-num {
  font-family: 'Bebas Neue', sans-serif; font-size: 32px; line-height: 1;
}
.rec-num.w { color: var(--green); }
.rec-num.d { color: var(--gold); }
.rec-num.l { color: rgba(220,80,80,0.8); }
.rec-label {
  font-family: 'Space Mono', monospace; font-size: 7px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
  margin-top: 2px;
}

/* CONTRACT / TIER */
.contract-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; background: rgba(123,47,255,0.06);
  border-bottom: 1px solid rgba(123,47,255,0.15);
  border-left: 3px solid rgba(123,47,255,0.4);
}
.contract-label {
  font-family: 'Space Mono', monospace; font-size: 7px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
}
.contract-val {
  font-size: 14px; font-weight: 700; letter-spacing: 1px;
  color: var(--pc);
}

/* UPCOMING FIGHT */
.upcoming-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  background: rgba(245,200,66,0.04);
  border-left: 3px solid var(--gold);
  border-bottom: 1px solid var(--border);
}
.upcoming-bar.empty {
  border-left-color: rgba(245,200,66,0.2);
}
.upcoming-tag {
  font-family: 'Space Mono', monospace; font-size: 6px;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--gold); text-shadow: var(--glow-gold);
  white-space: nowrap; flex-shrink: 0;
}
.upcoming-tag.dim { color: rgba(245,200,66,0.25); }
.upcoming-matchup {
  font-size: 15px; font-weight: 900; font-style: italic;
  letter-spacing: 0.04em; text-transform: uppercase; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.upcoming-matchup .vs {
  color: rgba(123,47,255,0.5); font-size: 12px; margin: 0 4px;
}
.upcoming-event {
  font-family: 'Space Mono', monospace; font-size: 7px;
  letter-spacing: 1px; color: var(--muted); text-transform: uppercase;
}
.upcoming-none {
  font-family: 'Space Mono', monospace; font-size: 8px;
  letter-spacing: 2px; color: rgba(255,255,255,0.12);
  text-transform: uppercase;
}

/* SECTION HEADS */
.section-head {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px 4px;
}
.section-title {
  font-family: 'Space Mono', monospace; font-size: 7px;
  letter-spacing: 3px; color: var(--muted); text-transform: uppercase;
  white-space: nowrap;
}
.section-title::before { content: '// '; color: var(--p); opacity: 0.5; }
.section-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }

/* FIGHT ROWS */
.fight-list { padding: 0 12px 4px; }
.fight-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.fight-row:last-child { border-bottom: none; }
.fight-result {
  font-family: 'Space Mono', monospace; font-size: 11px;
  font-weight: 700; width: 16px; flex-shrink: 0;
}
.fight-result.w { color: rgba(100,220,120,0.85); }
.fight-result.l { color: rgba(220,80,80,0.8); }
.fight-result.d { color: rgba(180,180,80,0.8); }
.fight-opponent {
  font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.75);
  flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.fight-method {
  font-family: 'Space Mono', monospace; font-size: 8px;
  letter-spacing: 1px; color: var(--muted); text-transform: uppercase;
  flex-shrink: 0;
}
.no-fights {
  font-family: 'Space Mono', monospace; font-size: 9px;
  color: rgba(255,255,255,0.12); letter-spacing: 2px; padding: 8px 0;
}

/* STATS GRID */
.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: var(--border);
  margin: 0 12px 12px;
  border: 1px solid var(--border);
}
.stat-cell {
  background: var(--surf); padding: 10px 12px;
  display: flex; flex-direction: column; gap: 2px;
}
.stat-cell-label {
  font-family: 'Space Mono', monospace; font-size: 6px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
}
.stat-cell-val {
  font-family: 'Bebas Neue', sans-serif; font-size: 24px;
  line-height: 1; color: var(--text);
}
.stat-cell-val.dim { color: var(--muted); }
.stat-cell-val.gold { color: var(--gold); text-shadow: var(--glow-gold); }

/* LOADING */
.loading {
  font-family: 'Space Mono', monospace; font-size: 9px;
  color: var(--muted); letter-spacing: 3px; text-transform: uppercase;
  padding: 60px 0; text-align: center;
}
</style>
</head>
<body>
<div id="root"><div class="loading">Loading...</div></div>

<script>
const SB  = 'https://emzlivoykbhhjcugupit.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtemxpdm95a2JoaGpjdWd1cGl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MTk5MzAsImV4cCI6MjA5Nzk5NTkzMH0.o3EWnaEHr2PN8kLuzZrf6hAtOmTFKHEH6IzViXqv1L4';
const H = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY };

const WC = { lightweight:'Lightweight', middleweight:'Middleweight', light_heavyweight:'Light-Heavyweight', heavyweight:'Heavyweight' };
function wcLabel(w) { return WC[w] || (w ? w.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()) : '—'); }
function titleCase(s) { return s ? s.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.substr(1).toLowerCase()) : ''; }
function slug() { return new URLSearchParams(window.location.search).get('fighter'); }

async function sb(table, params) {
  const r = await fetch(`${SB}/rest/v1/${table}?${params}`, { headers: H });
  return r.json();
}

async function load() {
  const s = slug();
  if (!s) { document.getElementById('root').innerHTML = '<div class="loading">Fighter not found</div>'; return; }

  try {
    // header first — need the real id before we can pull matches
    const cards = await sb('fighter_cards', `slug=eq.${encodeURIComponent(s)}&select=id,display_name,weight_class,level,profile_photo_url,wins,losses,draws,ko_wins,rank,contract_tier`);
    if (!cards.length) { document.getElementById('root').innerHTML = '<div class="loading">Fighter not found</div>'; return; }
    const f = cards[0];

    const matchData = await sb('fighter_matches', `fighter_id=eq.${f.id}&order=created_at.desc&select=status,method,won,opponent_name,event_name`);
    const completed = matchData.filter(m => m.status === 'completed');
    const scheduled = matchData.filter(m => m.status === 'scheduled');
    const recent = completed.slice(0, 5);
    const upcoming = scheduled[0];

    // null-safe stats + adaptive standing (amateurs have no contract; pros are tiered or free agents)
    const koWins = f.ko_wins ?? 0;
    let standingLabel, standingVal;
    if (f.level === 'amateur') { standingLabel = 'Standing'; standingVal = 'Amateur'; }
    else if (f.contract_tier) { standingLabel = 'Contract Tier'; standingVal = titleCase(f.contract_tier); }
    else { standingLabel = 'Standing'; standingVal = 'Free Agent'; }

    const photoHTML = f.profile_photo_url
      ? `<div class="hero-photo"><img src="${f.profile_photo_url}" alt="${f.display_name}"></div>`
      : `<div class="hero-photo"><div class="hero-photo-empty"><svg width="80" height="80" viewBox="0 0 80 80"><circle cx="40" cy="30" r="18" fill="white"/><ellipse cx="40" cy="70" rx="28" ry="18" fill="white"/></svg></div></div>`;

    const upcomingHTML = upcoming
      ? `<div class="upcoming-bar">
          <div class="upcoming-tag">Next</div>
          <div>
            <div class="upcoming-matchup">${f.display_name} <span class="vs">vs</span> ${upcoming.opponent_name || 'TBD'}</div>
            <div class="upcoming-event">${upcoming.event_name || ''}</div>
          </div>
        </div>`
      : `<div class="upcoming-bar empty">
          <div class="upcoming-tag dim">Next Fight</div>
          <div class="upcoming-none">Not scheduled</div>
        </div>`;

    const recentHTML = recent.length
      ? recent.map(m => {
          const isDraw = (m.method || '').toLowerCase() === 'draw';
          const res = isDraw ? 'd' : (m.won ? 'w' : 'l');
          return `<div class="fight-row">
            <div class="fight-result ${res}">${res.toUpperCase()}</div>
            <div class="fight-opponent">${titleCase(m.opponent_name)}</div>
            <div class="fight-method">${m.method || ''}</div>
          </div>`;
        }).join('')
      : '<div class="no-fights">No fights yet</div>';

    document.getElementById('root').innerHTML = `
      <div class="hero">
        ${photoHTML}
        <div class="hero-fade"></div>
        <div class="hero-left-bar"></div>
        <div class="hero-content">
          <div class="hero-name">${f.display_name || 'Unknown Fighter'}</div>
          <div class="hero-sub">
            <div class="hero-wc">${wcLabel(f.weight_class)}</div>
            <div class="hero-rank">${f.rank ? '#' + f.rank : 'Unranked'}</div>
          </div>
        </div>
      </div>

      <div class="record-bar">
        <div class="rec-block"><div class="rec-num w">${f.wins ?? 0}</div><div class="rec-label">Wins</div></div>
        <div class="rec-block"><div class="rec-num d">${f.draws ?? 0}</div><div class="rec-label">Draws</div></div>
        <div class="rec-block"><div class="rec-num l">${f.losses ?? 0}</div><div class="rec-label">Losses</div></div>
      </div>

      <div class="contract-row">
        <div class="contract-label">${standingLabel}</div>
        <div class="contract-val">${standingVal}</div>
      </div>

      ${upcomingHTML}

      <div class="section-head"><div class="section-title">Recent Fights</div><div class="section-line"></div></div>
      <div class="fight-list">${recentHTML}</div>

      <div class="section-head"><div class="section-title">Stats</div><div class="section-line"></div></div>
      <div class="stats-grid">
        <div class="stat-cell">
          <div class="stat-cell-label">KO Wins</div>
          <div class="stat-cell-val ${koWins ? 'gold' : 'dim'}">${koWins}</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-label">Level</div>
          <div class="stat-cell-val">${f.level ? titleCase(f.level) : '—'}</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-label">Prize Money</div>
          <div class="stat-cell-val dim">$0</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-label">Total KD</div>
          <div class="stat-cell-val dim">—</div>
        </div>
      </div>`;

  } catch(e) {
    console.error(e);
    document.getElementById('root').innerHTML = '<div class="loading">Error loading fighter</div>';
  }
}

load();
</script>
</body>
</html>
