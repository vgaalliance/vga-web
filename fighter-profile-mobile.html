<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fighter Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --p: #7B2FFF; --pl: #A855F7; --gold: #F5C842;
  --bg: #06060A; --surf: #0B0B12; --border: #181824;
  --text: #DDD8F0; --muted: #4A4A68;
  --glow-sm: 0 0 8px rgba(123,47,255,0.7), 0 0 20px rgba(123,47,255,0.3);
  --glow-md: 0 0 12px rgba(123,47,255,0.9), 0 0 30px rgba(123,47,255,0.4);
  --glow-gold: 0 0 10px rgba(245,200,66,0.6), 0 0 25px rgba(245,200,66,0.2);
}
@keyframes phosphor-glitch {
  0%,85%,100% { text-shadow: var(--glow-md); filter: blur(0); }
  87% { text-shadow: -2px 0 rgba(255,30,100,0.65), 2px 0 rgba(0,220,255,0.65), 0 0 20px rgba(123,47,255,0.9); filter: blur(0.3px); }
  89% { text-shadow: 1px 0 rgba(255,30,100,0.4), -1px 0 rgba(0,220,255,0.4), 0 0 30px rgba(168,85,247,1); }
  91% { text-shadow: var(--glow-md); filter: blur(0); }
}
@keyframes holo {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: 'Barlow Condensed', sans-serif; min-height: 100vh; overflow-x: hidden; }
/* CRT scanlines */
body::before {
  content: ''; position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.09) 2px, rgba(0,0,0,0.09) 4px);
  pointer-events: none; z-index: 9999;
}

/* HERO */
.hero {
  height: 120px; background: var(--surf);
  border-bottom: 2px solid var(--p);
  position: relative; overflow: hidden;
  padding: 10px 14px; display: flex; flex-direction: column; justify-content: flex-end;
}
.hero-lb { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: linear-gradient(180deg, var(--pl), var(--p)); }
.hero-holo {
  position: absolute; inset: 0;
  background: linear-gradient(115deg, transparent 20%, rgba(168,85,247,0.08) 38%, rgba(196,132,252,0.14) 48%, rgba(123,47,255,0.08) 58%, transparent 72%);
  background-size: 200% 100%; animation: holo 3.5s ease-in-out infinite; pointer-events: none;
}
.hero-badge {
  position: absolute; top: 10px; right: 14px;
  font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 1px; text-transform: uppercase;
  padding: 3px 8px; z-index: 2;
}
.hero-badge.diamond { color: #a8f0ff; background: rgba(168,240,255,0.1); border: 1px solid rgba(168,240,255,0.35); text-shadow: 0 0 8px rgba(168,240,255,0.6); }
.hero-badge.gold    { color: var(--gold); background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.3); text-shadow: var(--glow-gold); }
.hero-badge.silver  { color: #c0c0c8; background: rgba(192,192,200,0.1); border: 1px solid rgba(192,192,200,0.3); }
.hero-badge.bronze  { color: #cd7f32; background: rgba(205,127,50,0.1); border: 1px solid rgba(205,127,50,0.3); }
.hero-badge.ama, .hero-badge.pro { color: var(--muted); background: rgba(74,74,104,0.12); border: 1px solid rgba(74,74,104,0.35); }
.hero-inner { position: relative; z-index: 2; }
.hero-nick { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: var(--pl); margin-bottom: 3px; text-shadow: var(--glow-sm); }
.hero-name { font-family: 'Bebas Neue', sans-serif; font-size: 44px; color: var(--text); line-height: 1; letter-spacing: 1px; animation: phosphor-glitch 11s infinite; }
.hero-sub { display: flex; align-items: center; gap: 8px; margin-top: 3px; }
.hero-wc  { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
.hero-rank { font-family: 'Space Mono', monospace; font-size: 7px; color: var(--pl); text-shadow: var(--glow-sm); }

/* NEXT FIGHT BANNER */
.next-fight {
  display: flex; align-items: stretch;
  border-bottom: 1px solid var(--border);
  position: relative; overflow: hidden; min-height: 42px;
}
.next-fight.has-fight { background: rgba(245,200,66,0.04); border-left: 3px solid var(--gold); }
.next-fight.no-fight  { border-left: 3px solid var(--border); }
.next-inner { display: flex; align-items: center; gap: 8px; padding: 7px 12px; flex: 1; min-width: 0; padding-right: 38px; }
.next-label { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
.has-fight .next-label { color: var(--gold); text-shadow: var(--glow-gold); }
.no-fight  .next-label { color: var(--muted); }
.next-matchup { font-size: 14px; font-weight: 900; font-style: italic; color: var(--text); text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.next-matchup .vs { color: rgba(123,47,255,0.5); font-size: 11px; margin: 0 3px; }
.next-event { font-family: 'Space Mono', monospace; font-size: 6px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
.next-none  { font-family: 'Space Mono', monospace; font-size: 7px; color: rgba(74,74,104,0.7); text-transform: uppercase; }
.vod-strip  { position: absolute; right: 0; top: 0; bottom: 0; border-left: 1px solid rgba(245,200,66,0.25); background: rgba(245,200,66,0.07); display: flex; align-items: center; justify-content: center; padding: 0 9px; text-decoration: none; }
.vod-strip span { font-family: 'Space Mono', monospace; font-size: 6px; letter-spacing: 1px; color: rgba(245,200,66,0.7); text-transform: uppercase; writing-mode: vertical-rl; transform: rotate(180deg); }

/* W/D/L + TAPE STRIP (one combined row) */
.stats-strip { display: flex; border-bottom: 1px solid var(--border); }
.record-block { display: flex; border-right: 2px solid rgba(123,47,255,0.2); flex-shrink: 0; }
.rec-cell { text-align: center; padding: 6px 10px; border-right: 1px solid var(--border); }
.rec-cell:last-child { border-right: none; }
.rec-num { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--text); line-height: 1; }
.rec-lbl { font-family: 'Space Mono', monospace; font-size: 6px; color: var(--muted); text-transform: uppercase; letter-spacing: 0; margin-top: 2px; }
.tape-block { flex: 1; display: flex; }
.tape-cell { flex: 1; padding: 6px 6px; border-right: 1px solid var(--border); }
.tape-cell:last-child { border-right: none; }
.tape-lbl  { font-family: 'Space Mono', monospace; font-size: 5.5px; letter-spacing: 0; text-transform: uppercase; color: var(--muted); }
.tape-val  { font-size: 13px; font-weight: 700; color: var(--text); margin-top: 3px; }
.tape-flag { font-size: 16px; margin-top: 2px; line-height: 1; }

/* SECTION HEADER */
.sec-head { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 8px 14px 4px; }
.sec-head::before { content: '// '; color: var(--pl); opacity: 0.5; }

/* FIGHT ROWS */
.fight-row { display: flex; align-items: flex-start; gap: 8px; padding: 7px 14px; border-bottom: 1px solid rgba(123,47,255,0.07); }
.fight-row:last-child { border-bottom: none; }
.fight-res { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; width: 14px; flex-shrink: 0; padding-top: 1px; }
.fight-res.w { color: #22c55e; }
.fight-res.l { color: rgba(215,55,55,0.85); }
.fight-res.d { color: rgba(200,180,80,0.8); }
.fight-info { flex: 1; min-width: 0; }
.fight-opp  { font-size: 15px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 5px; }
.fight-title-tag { font-family: 'Space Mono', monospace; font-size: 5px; letter-spacing: 1px; color: var(--gold); background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.3); padding: 1px 4px; text-transform: uppercase; flex-shrink: 0; }
.fight-event  { font-family: 'Space Mono', monospace; font-size: 5.5px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
.fight-method { font-family: 'Space Mono', monospace; font-size: 7.5px; color: var(--muted); text-transform: uppercase; flex-shrink: 0; padding-top: 2px; }
.no-fights { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 2px; color: rgba(74,74,104,0.6); text-transform: uppercase; padding: 12px 14px; }

/* ACHIEVEMENTS */
.ach-row { display: flex; border-top: 1px solid var(--border); }
.ach-cell { flex: 1; text-align: center; padding: 7px 0; border-right: 1px solid var(--border); }
.ach-cell:last-child { border-right: none; }
.ach-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; line-height: 1; color: var(--text); }
.ach-lbl { font-family: 'Space Mono', monospace; font-size: 6px; letter-spacing: 0; text-transform: uppercase; color: var(--muted); display: block; margin-top: 2px; }

/* VC STASH */
.stash-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 14px 14px; border-top: 1px solid var(--border); }
.stash-lbl { font-family: 'Space Mono', monospace; font-size: 6px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
.stash-val { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--pl); text-shadow: var(--glow-sm); }

/* LOADING / ERROR */
.loading-state { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); padding: 80px 0; text-align: center; }
</style>
</head>
<body>
<div id="root"><div class="loading-state">Loading...</div></div>
<script>
const SB  = 'https://emzlivoykbhhjcugupit.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtemxpdm95a2JoaGpjdWd1cGl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MTk5MzAsImV4cCI6MjA5Nzk5NTkzMH0.o3EWnaEHr2PN8kLuzZrf6hAtOmTFKHEH6IzViXqv1L4';
const H   = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY };

const FLAGS = {
  'United States':'🇺🇸','Canada':'🇨🇦','United Kingdom':'🇬🇧','Australia':'🇦🇺',
  'Germany':'🇩🇪','France':'🇫🇷','Japan':'🇯🇵','Brazil':'🇧🇷','Mexico':'🇲🇽',
  'Netherlands':'🇳🇱','Ireland':'🇮🇪','Russia':'🇷🇺','South Korea':'🇰🇷',
  'Jamaica':'🇯🇲','Nigeria':'🇳🇬','Ghana':'🇬🇭','Poland':'🇵🇱','Philippines':'🇵🇭',
  'South Africa':'🇿🇦','Italy':'🇮🇹','Spain':'🇪🇸','Argentina':'🇦🇷',
  'Colombia':'🇨🇴','Cuba':'🇨🇺','Puerto Rico':'🇵🇷','Dominican Republic':'🇩🇴',
  'Venezuela':'🇻🇪','Trinidad and Tobago':'🇹🇹','New Zealand':'🇳🇿','Sweden':'🇸🇪',
  'Denmark':'🇩🇰','Norway':'🇳🇴','Finland':'🇫🇮','China':'🇨🇳','India':'🇮🇳',
  'Pakistan':'🇵🇰','Thailand':'🇹🇭','Indonesia':'🇮🇩','Kazakhstan':'🇰🇿',
  'Ukraine':'🇺🇦','Turkey':'🇹🇷','Morocco':'🇲🇦','Ethiopia':'🇪🇹','Kenya':'🇰🇪',
  'Portugal':'🇵🇹','Greece':'🇬🇷','Czechia':'🇨🇿','Hungary':'🇭🇺','Romania':'🇷🇴',
  'Belgium':'🇧🇪','Switzerland':'🇨🇭','Austria':'🇦🇹','Honduras':'🇭🇳','El Salvador':'🇸🇻',
  'Guatemala':'🇬🇹','Panama':'🇵🇦','Ecuador':'🇪🇨','Peru':'🇵🇪','Bolivia':'🇧🇴',
  'Chile':'🇨🇱','Uruguay':'🇺🇾','Paraguay':'🇵🇾','Guyana':'🇬🇾','Suriname':'🇸🇷',
  'Haiti':'🇭🇹','Barbados':'🇧🇧','Bahamas':'🇧🇸','Belize':'🇧🇿','Costa Rica':'🇨🇷',
  'Nicaragua':'🇳🇮','Cameroon':'🇨🇲','Congo':'🇨🇬','Senegal':'🇸🇳','Ivory Coast':'🇨🇮',
  'Egypt':'🇪🇬','Algeria':'🇩🇿','Tunisia':'🇹🇳','Libya':'🇱🇾','Sudan':'🇸🇩',
  'Saudi Arabia':'🇸🇦','Iran':'🇮🇷','Iraq':'🇮🇶','Israel':'🇮🇱','Jordan':'🇯🇴',
  'Lebanon':'🇱🇧','Syria':'🇸🇾','Afghanistan':'🇦🇫','Bangladesh':'🇧🇩',
  'Sri Lanka':'🇱🇰','Nepal':'🇳🇵','Myanmar':'🇲🇲','Vietnam':'🇻🇳','Malaysia':'🇲🇾',
  'Singapore':'🇸🇬','Taiwan':'🇹🇼','Hong Kong':'🇭🇰','Cambodia':'🇰🇭','Laos':'🇱🇦',
};

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtHeight(inches) {
  if (!inches) return '—';
  return `${Math.floor(inches / 12)}'${inches % 12}"`;
}

function fmtMethod(method, round) {
  if (!method) return '—';
  const m = method.toLowerCase();
  if (m === 'decision')  return 'Dec';
  if (m === 'draw')      return 'Draw';
  if (m === 'cancelled') return '—';
  if (m === 'dq')        return 'DQ';
  const base = method.toUpperCase();
  return round ? `${base} R${round}` : base;
}

function fmtStance(s) {
  if (!s) return '—';
  const map = { orthodox: 'Ortho', southpaw: 'South', switch: 'Switch' };
  return map[s.toLowerCase()] || s;
}

function wcLabel(w) {
  const map = { lightweight:'Lightweight', middleweight:'Middleweight', light_heavyweight:'Lt. Heavy', heavyweight:'Heavyweight' };
  return map[w] || (w ? w.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()) : '—');
}

function badgeHTML(f) {
  if (f.level === 'amateur') return `<div class="hero-badge ama">AMA</div>`;
  const tier = (f.contract_tier || '').toLowerCase();
  if (tier === 'diamond') return `<div class="hero-badge diamond">DIAMOND</div>`;
  if (tier === 'gold')    return `<div class="hero-badge gold">GOLD</div>`;
  if (tier === 'silver')  return `<div class="hero-badge silver">SILVER</div>`;
  if (tier === 'bronze')  return `<div class="hero-badge bronze">BRONZE</div>`;
  return `<div class="hero-badge pro">PRO</div>`;
}

async function sb(table, params) {
  const r = await fetch(`${SB}/rest/v1/${table}?${params}`, { headers: H });
  return r.json();
}

async function load() {
  const slug = new URLSearchParams(window.location.search).get('fighter');
  if (!slug) { show('<div class="loading-state">Fighter not found</div>'); return; }

  try {
    const cards = await sb('fighter_cards',
      `slug=eq.${encodeURIComponent(slug)}&select=id,display_name,nickname,weight_class,level,wins,losses,draws,ko_wins,rank,contract_tier,height,reach,stance,country,vc_balance`);
    if (!cards.length) { show('<div class="loading-state">Fighter not found</div>'); return; }
    const f = cards[0];

    const matches = await sb('fighter_matches',
      `fighter_id=eq.${f.id}&order=event_date.desc.nullslast,created_at.desc&select=status,method,finish_round,won,opponent_name,event_name,vod_link,is_title_fight&limit=20`);

    const completed = matches.filter(m => m.status === 'completed');
    const upcoming  = matches.find(m => m.status === 'scheduled');
    const recent    = completed.slice(0, 5);
    const lastVod   = completed.find(m => m.vod_link)?.vod_link ?? null;
    const beltCount = completed.filter(m => m.is_title_fight && m.won === true).length;

    show(render(f, recent, upcoming, lastVod, beltCount));
  } catch(e) {
    console.error(e);
    show('<div class="loading-state">Error loading fighter</div>');
  }
}

function render(f, recent, upcoming, lastVod, beltCount) {
  const countryFlag = FLAGS[f.country] ?? null;
  const vodEl = lastVod ? `<a class="vod-strip" href="${esc(lastVod)}" target="_blank" rel="noopener"><span>▶ VOD</span></a>` : '';

  // Hero
  const nickEl = f.nickname ? `<div class="hero-nick">"${esc(f.nickname)}"</div>` : '';
  const hero = `
    <div class="hero">
      <div class="hero-lb"></div>
      <div class="hero-holo"></div>
      ${badgeHTML(f)}
      <div class="hero-inner">
        ${nickEl}
        <div class="hero-name">${esc(f.display_name)}</div>
        <div class="hero-sub">
          <span class="hero-wc">${wcLabel(f.weight_class)}</span>
          <span class="hero-rank">${f.rank ? '#' + f.rank : 'Unranked'}</span>
        </div>
      </div>
    </div>`;

  // Next fight banner
  let nextBanner;
  if (upcoming) {
    nextBanner = `
      <div class="next-fight has-fight">
        <div class="next-inner">
          <div class="next-label">NEXT</div>
          <div style="min-width:0;">
            <div class="next-matchup">${esc(f.display_name)} <span class="vs">vs</span> ${esc(upcoming.opponent_name || 'TBD')}</div>
            <div class="next-event">${esc(upcoming.event_name || '')}</div>
          </div>
        </div>
        ${vodEl}
      </div>`;
  } else {
    nextBanner = `
      <div class="next-fight no-fight">
        <div class="next-inner">
          <div class="next-label">NEXT</div>
          <div class="next-none">No bout scheduled</div>
        </div>
        ${vodEl}
      </div>`;
  }

  // Stats strip
  const statsStrip = `
    <div class="stats-strip">
      <div class="record-block">
        <div class="rec-cell"><div class="rec-num">${f.wins ?? 0}</div><div class="rec-lbl">WINS</div></div>
        <div class="rec-cell"><div class="rec-num">${f.draws ?? 0}</div><div class="rec-lbl">DRW</div></div>
        <div class="rec-cell"><div class="rec-num">${f.losses ?? 0}</div><div class="rec-lbl">LOSS</div></div>
      </div>
      <div class="tape-block">
        <div class="tape-cell"><div class="tape-lbl">HT</div><div class="tape-val">${fmtHeight(f.height)}</div></div>
        <div class="tape-cell"><div class="tape-lbl">REACH</div><div class="tape-val">${f.reach ? f.reach + '"' : '—'}</div></div>
        <div class="tape-cell"><div class="tape-lbl">STANCE</div><div class="tape-val">${fmtStance(f.stance)}</div></div>
        <div class="tape-cell"><div class="tape-lbl">FROM</div>
          ${countryFlag
            ? `<div class="tape-flag">${countryFlag}</div>`
            : `<div class="tape-val">${f.country ? esc(f.country.substring(0,3).toUpperCase()) : '—'}</div>`}
        </div>
      </div>
    </div>`;

  // Fight rows
  let fightsInner;
  if (!recent.length) {
    fightsInner = '<div class="no-fights">No fights yet</div>';
  } else {
    fightsInner = recent.map(m => {
      const isDraw  = (m.method || '').toLowerCase() === 'draw';
      const resClass = isDraw ? 'd' : (m.won ? 'w' : 'l');
      const resLetter = isDraw ? 'D' : (m.won ? 'W' : 'L');
      const titleTag = m.is_title_fight ? `<span class="fight-title-tag">TITLE</span>` : '';
      return `
        <div class="fight-row">
          <div class="fight-res ${resClass}">${resLetter}</div>
          <div class="fight-info">
            <div class="fight-opp">${esc(m.opponent_name || 'Unknown')} ${titleTag}</div>
            <div class="fight-event">${esc(m.event_name || '')}</div>
          </div>
          <div class="fight-method">${fmtMethod(m.method, m.finish_round)}</div>
        </div>`;
    }).join('');
  }

  return `
    ${hero}
    ${nextBanner}
    ${statsStrip}
    <div class="sec-head">Fights</div>
    <div>${fightsInner}</div>
    <div class="ach-row">
      <div class="ach-cell"><div class="ach-num">${f.ko_wins ?? 0}</div><span class="ach-lbl">KOs</span></div>
      <div class="ach-cell"><div class="ach-num">${beltCount}</div><span class="ach-lbl">Belts</span></div>
      <div class="ach-cell"><div class="ach-num">$—</div><span class="ach-lbl">Prize</span></div>
    </div>
    <div class="stash-row">
      <span class="stash-lbl">VC Stash</span>
      <span class="stash-val">${(f.vc_balance ?? 0).toLocaleString()}</span>
    </div>`;
}

function show(html) { document.getElementById('root').innerHTML = html; }

load();
</script>
</body>
</html>
