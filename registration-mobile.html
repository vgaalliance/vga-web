<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600&family=Space+Mono&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  font-family: 'Barlow Condensed', sans-serif;
  color: #fff;
}

body {
  background: rgba(5,2,20,0.75);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px 16px;
}

.reg {
  background: #0d0530;
  border: 1px solid rgba(168,85,247,0.15);
  border-radius: 6px;
  padding: 44px 24px 36px;
  text-align: center;
  width: 100%;
  max-width: 400px;
}

.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 0.06em;
  margin-bottom: 10px;
}

.sub {
  font-size: 16px;
  font-weight: 300;
  color: rgba(255,255,255,0.45);
  line-height: 1.55;
  margin: 0 auto 28px;
}

.cmd {
  color: rgba(230,180,40,0.85);
  font-family: 'Space Mono', monospace;
  font-size: 14px;
}

.btn {
  display: block;
  padding: 16px;
  background: rgba(88,101,242,0.15);
  border: 1px solid rgba(88,101,242,0.4);
  border-radius: 4px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.12em;
  color: rgba(88,101,242,0.95);
  text-decoration: none;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.fine {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  color: rgba(255,255,255,0.18);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 24px;
}

.site-note {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
</style>
</head>
<body>

<div class="reg">
  <div class="title">JOIN THE UBA</div>
  <div class="sub">The site is being built while we onboard new and existing fighters. Join our Discord and type <span class="cmd">/register</span> to get started.</div>
  <a class="btn" href="https://discord.gg/uba" target="_blank" rel="noopener">Join Discord</a>
  <div class="fine">Free · VR headset required</div>
  <div class="site-note">Site is being built — launches after registration</div>
</div>

</body>
</html>
