<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,900;1,700;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: transparent; font-family: 'Barlow Condensed', sans-serif; color: #fff; width: 975px; }

.profile-header {
  position: relative;
  width: 100%;
  min-height: 220px;
  background: #0d0530;
  border-left: 3px solid rgba(168,85,247,0.7);
  border-top: 2px solid rgba(168,85,247,0.4);
  display: flex;
  overflow: hidden;
  margin-bottom: 4px;
}
.header-main {
  flex: 1;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  z-index: 2;
}
.header-top { display: flex; align-items: flex-start; justify-content: space-between; }
.fighter-name {
  font-size: 56px;
  font-weight: 900;
  letter-spacing: 0.02em;
  line-height: 1;
  color: #fff;
  text-transform: lowercase;
}
.rank-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.1em;
  text-align: right;
  padding-top: 6px;
}
.rank-badge span { color: rgba(168,85,247,0.8); font-size: 15px; }
.weight-class {
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-top: 4px;
}
.contract-box {
  display: inline-block;
  margin-top: 12px;
  padding: 5px 12px;
  background: rgba(168,85,247,0.12);
  border: 1px solid rgba(168,85,247,0.25);
}
.contract-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(168,85,247,0.5);
  margin-bottom: 2px;
}
.contract-tier {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: rgba(216,180,254,0.9);
}
.header-stats { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.stat-row {
  display: flex;
  align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding-bottom: 8px;
}
.stat-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.3);
  width: 140px;
  flex-shrink: 0;
}
.stat-value { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.75); letter-spacing: 0.04em; }
.record-val { font-size: 20px; font-weight: 900; color: rgba(255,255,255,0.85); letter-spacing: 0.02em; }
.record-val em { font-style: normal; font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.2); margin: 0 3px; }
.header-photo {
  width: 200px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  background: rgba(168,85,247,0.05);
}
.header-photo img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
.header-photo::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0; width: 60px;
  background: linear-gradient(to right, #0d0530, transparent);
  z-index: 2;
}
.no-photo { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
.no-photo svg { opacity: 0.08; }

.bottom { display: flex; gap: 4px; width: 100%; }
.recent-fights {
  width: 280px;
  flex-shrink: 0;
  background: #0a0420;
  border-left: 3px solid rgba(168,85,247,0.3);
  padding: 16px;
}
.section-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(230,180,40,0.7);
  margin-bottom: 12px;
}
.fight-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.fight-result { font-family: 'Share Tech Mono', monospace; font-size: 11px; font-weight: 700; width: 14px; flex-shrink: 0; }
.fight-result.w { color: rgba(100,220,120,0.8); }
.fight-result.l { color: rgba(220,80,80,0.8); }
.fight-result.d { color: rgba(180,180,80,0.8); }
.fight-opponent { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.7); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fight-method { font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 0.1em; color: rgba(255,255,255,0.2); text-transform: uppercase; flex-shrink: 0; }
.no-fights { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.15); letter-spacing: 0.1em; padding: 8px 0; }

.advanced-stats { flex: 1; background: #0a0318; border-left: 3px solid rgba(200,160,30,0.3); }
.adv-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(230,180,40,0.55);
  padding: 14px 16px 10px;
  border-bottom: 1px solid rgba(200,160,30,0.1);
}
.adv-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid rgba(200,160,30,0.08);
}
.adv-name { font-size: 18px; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(200,160,30,0.75); }
.adv-val { font-size: 22px; font-weight: 900; color: rgba(255,255,255,0.8); letter-spacing: 0.04em; }
.adv-val.dim { color: rgba(255,255,255,0.25); }

.upcoming-bar {
  background: #0d0530;
  padding: 0 20px;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 4px;
  border-top: 2px solid rgba(168,85,247,0.7);
  border-left: 3px solid rgba(168,85,247,0.7);
}
.upcoming-bar.empty { border-top-color: rgba(168,85,247,0.3); border-left-color: rgba(168,85,247,0.3); }
.upcoming-tag {
  font-size: 14px;
  font-weight: 900;
  font-style: italic;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(230,180,40,0.9);
  white-space: nowrap;
  flex-shrink: 0;
}
.upcoming-tag.dim { color: rgba(230,180,40,0.35); }
.upcoming-matchup { font-size: 26px; font-weight: 900; font-style: italic; letter-spacing: 0.04em; text-transform: uppercase; color: #fff; }
.upcoming-matchup .vs { color: rgba(168,85,247,0.45); font-size: 20px; margin: 0 8px; }
.upcoming-event { font-family: 'Share Tech Mono', monospace; font-size: 8px; letter-spacing: 0.2em; color: rgba(168,85,247,0.4); text-transform: uppercase; }
.upcoming-none { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 0.28em; color: rgba(255,255,255,0.18); text-transform: uppercase; }

.loading { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.15); letter-spacing: 0.15em; padding: 40px; text-align: center; }
</style>
</head>
<body>

<div id="root"><div class="loading">loading...</div></div>

<script>
const SB  = 'https://emzlivoykbhhjcugupit.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtemxpdm95a2JoaGpjdWd1cGl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MTk5MzAsImV4cCI6MjA5Nzk5NTkzMH0.o3EWnaEHr2PN8kLuzZrf6hAtOmTFKHEH6IzViXqv1L4';
const H   = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY };

const WC = { lightweight:'Lightweight', middleweight:'Middleweight', light_heavyweight:'Light-Heavyweight', heavyweight:'Heavyweight' };
function wcLabel(w) { return WC[w] || (w ? w.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()) : ''); }
function toTitleCase(str) { return str ? str.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.substr(1).toLowerCase()) : ''; }

function slug() { return new URLSearchParams(window.location.search).get('fighter'); }

async function sb(table, params) {
  const r = await fetch(`${SB}/rest/v1/${table}?${params}`, { headers: H });
  return r.json();
}

async function load() {
  const s = slug();
  if (!s) { document.getElementById('root').innerHTML = '<div class="loading">fighter not found</div>'; return; }

  try {
    // 1. header data — single view query
    const cards = await sb('fighter_cards', `slug=eq.${encodeURIComponent(s)}&select=id,display_name,weight_class,level,profile_photo_url,wins,losses,draws,ko_wins,rank,contract_tier`);
    if (!cards.length) { document.getElementById('root').innerHTML = '<div class="loading">fighter not found</div>'; return; }
    const f = cards[0];

    // 2. match history — single view query
    const matches = await sb('fighter_matches', `fighter_id=eq.${f.id}&order=created_at.desc&select=status,method,won,opponent_name,event_name`);
    const completed = matches.filter(m => m.status === 'completed');
    const scheduled = matches.filter(m => m.status === 'scheduled');
    const recent = completed.slice(0, 5);
    const upcoming = scheduled[0];

    const contractTier = f.contract_tier ? toTitleCase(f.contract_tier) : 'No Contract';

    // 3. upcoming bar
    let upcomingHTML = '';
    if (upcoming) {
      upcomingHTML = `
        <div class="upcoming-bar">
          <div class="upcoming-tag">Upcoming Fight</div>
          <div>
            <div class="upcoming-matchup">${f.display_name} <span class="vs">vs</span> ${upcoming.opponent_name || 'TBD'}</div>
            <div class="upcoming-event">${upcoming.event_name || ''}</div>
          </div>
        </div>`;
    } else {
      upcomingHTML = `
        <div class="upcoming-bar empty">
          <div class="upcoming-tag dim">Upcoming Fight</div>
          <div class="upcoming-none">No upcoming fight scheduled</div>
        </div>`;
    }

    // 4. photo
    const photoHTML = f.profile_photo_url
      ? `<img src="${f.profile_photo_url}" alt="${f.display_name}">`
      : `<div class="no-photo"><svg width="80" height="80" viewBox="0 0 80 80"><circle cx="40" cy="30" r="18" fill="white"/><ellipse cx="40" cy="70" rx="28" ry="18" fill="white"/></svg></div>`;

    // 5. recent fights
    const recentHTML = recent.length
      ? recent.map(r => {
          const isDraw = r.method === 'draw';
          const res = isDraw ? 'd' : (r.won ? 'w' : 'l');
          return `<div class="fight-row">
            <div class="fight-result ${res}">${res.toUpperCase()}</div>
            <div class="fight-opponent">${toTitleCase(r.opponent_name)}</div>
            <div class="fight-method">${r.method || ''}</div>
          </div>`;
        }).join('')
      : '<div class="no-fights">No fights yet</div>';

    // 6. render
    document.getElementById('root').innerHTML = `
      <div class="profile-header">
        <div class="header-main">
          <div class="header-top">
            <div>
              <div class="fighter-name">${f.display_name}</div>
              <div class="weight-class">${wcLabel(f.weight_class)}</div>
              <div class="contract-box">
                <div class="contract-label">Contract Tier</div>
                <div class="contract-tier">${contractTier}</div>
              </div>
            </div>
            <div class="rank-badge"># <span>${f.rank ? f.rank : '-'}</span> Rank</div>
          </div>
          <div class="header-stats">
            <div class="stat-row"><div class="stat-label">Age</div><div class="stat-value">—</div></div>
            <div class="stat-row"><div class="stat-label">Current Team</div><div class="stat-value">—</div></div>
            <div class="stat-row">
              <div class="stat-label">Record</div>
              <div class="record-val">${f.wins}<em>W</em> <em>/</em> ${f.draws}<em>D</em> <em>/</em> ${f.losses}<em>L</em></div>
            </div>
          </div>
        </div>
        <div class="header-photo">${photoHTML}</div>
      </div>

      ${upcomingHTML}

      <div class="bottom">
        <div class="recent-fights">
          <div class="section-label">Recent Fights</div>
          ${recentHTML}
        </div>
        <div class="advanced-stats">
          <div class="adv-label">Advanced Stats</div>
          <div class="adv-row"><div class="adv-name">Wins via KO</div><div class="adv-val">${f.ko_wins}</div></div>
          <div class="adv-row"><div class="adv-name">Total KD</div><div class="adv-val dim">—</div></div>
          <div class="adv-row"><div class="adv-name">Prize Money</div><div class="adv-val dim">$0</div></div>
          <div class="adv-row"><div class="adv-name">Achievements</div><div class="adv-val dim">—</div></div>
        </div>
      </div>`;

  } catch(e) {
    console.error(e);
    document.getElementById('root').innerHTML = '<div class="loading">error loading fighter</div>';
  }
}

load();
</script>
</body>
</html>
